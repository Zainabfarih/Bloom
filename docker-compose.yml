name: bloom

networks:
  bloom-net:
    driver: bridge

volumes:
  redis-data:
  grafana-data:

services:

  redis:
    image: redis:7-alpine
    container_name: bloom-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - bloom-net

  discovery-server:
    build:
      context: ./infrastructure/discovery-server
    image: bloom/discovery-server:latest
    container_name: bloom-discovery
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bloom-net

  config-server:
    build:
      context: ./infrastructure/config-server
    image: bloom/config-server:latest
    container_name: bloom-config
    environment:
      CONFIG_SERVER_PROFILE: native
      CONFIG_REPO_PATH: /config-repo
      EUREKA_URI: http://discovery-server:8761/eureka/
    volumes:
      - ./config-repo:/config-repo:ro
    ports:
      - "8888:8888"
    depends_on:
      discovery-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - bloom-net

  job-service:
    build:
      context: ./services/job-service
    image: bloom/job-service:latest
    container_name: bloom-job
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      CONFIG_SERVER_PROFILE: native
      EUREKA_URI: http://discovery-server:8761/eureka/
      ADMIN_SERVER_URL: http://admin-server:8090
      # Base de donnees externe (Azure) fournie via .env
      DB_JOB_URL: ${DB_JOB_URL}
      DB_JOB_USERNAME: ${DB_JOB_USERNAME}
      DB_JOB_PASSWORD: ${DB_JOB_PASSWORD}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_GATEWAY_SECRET: ${INTERNAL_GATEWAY_SECRET}
      SKILL_EXTRACTOR_HF_MODEL_URL: ${SKILL_EXTRACTOR_HF_MODEL_URL:-}
      GEMINI_API_KEY_JOB_SKILLS: ${GEMINI_API_KEY_JOB_SKILLS:-}
      JOBSAPI_BASE_URL: ${JOBSAPI_BASE_URL:-}
      JOBAPI_KEY: ${JOBAPI_KEY:-}
    ports:
      - "8083:8083"
    depends_on:
      redis:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - bloom-net

  cv-service:
    build:
      context: ./services/cv-service
    image: bloom/cv-service:latest
    container_name: bloom-cv
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      CONFIG_SERVER_PROFILE: native
      EUREKA_URI: http://discovery-server:8761/eureka/
      ADMIN_SERVER_URL: http://admin-server:8090
      # Base de donnees externe (Azure) fournie via .env
      DB_CV_URL: ${DB_CV_URL}
      DB_CV_USERNAME: ${DB_CV_USERNAME}
      DB_CV_PASSWORD: ${DB_CV_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_GATEWAY_SECRET: ${INTERNAL_GATEWAY_SECRET}
      GEMINI_API_KEY_CV: ${GEMINI_API_KEY_CV:-}
      SKILL_EXTRACTOR_HF_MODEL_URL: ${SKILL_EXTRACTOR_HF_MODEL_URL:-}
    ports:
      - "8082:8082"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - bloom-net

  api-gateway:
    build:
      context: ./infrastructure/api-gateway
    image: bloom/api-gateway:latest
    container_name: bloom-gateway
    environment:
      EUREKA_URI: http://discovery-server:8761/eureka/
      ADMIN_SERVER_URL: http://admin-server:8090
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_GATEWAY_SECRET: ${INTERNAL_GATEWAY_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_started
      config-server:
        condition: service_healthy
    networks:
      - bloom-net

  admin-server:
    build:
      context: ./infrastructure/admin-server
    image: bloom/admin-server:latest
    container_name: bloom-admin
    environment:
      EUREKA_URI: http://discovery-server:8761/eureka/
    ports:
      - "8090:8090"
    depends_on:
      discovery-server:
        condition: service_started
    networks:
      - bloom-net

  auth-service:
    build:
      context: ./services/auth-service
    image: bloom/auth-service:latest
    container_name: bloom-auth
    environment:
      EUREKA_URI: http://discovery-server:8761/eureka/
      # Base de donnees externe (Azure / Supabase) fournie via .env
      DB_AUTH_URL: ${DB_AUTH_URL}
      DB_AUTH_USER: ${DB_AUTH_USER}
      DB_AUTH_PASS: ${DB_AUTH_PASS}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_GATEWAY_SECRET: ${INTERNAL_GATEWAY_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8081:8081"
    depends_on:
      discovery-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - bloom-net

  roadmap-service:
    build:
      context: ./services/roadmap-service
    image: bloom/roadmap-service:latest
    container_name: bloom-roadmap
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      CONFIG_SERVER_PROFILE: native
      EUREKA_URI: http://discovery-server:8761/eureka/
      ADMIN_SERVER_URL: http://admin-server:8090
      # Base de donnees externe (Azure / Supabase) fournie via .env
      DB_ROADMAP_URL: ${DB_ROADMAP_URL}
      DB_ROADMAP_USERNAME: ${DB_ROADMAP_USERNAME}
      DB_ROADMAP_PASSWORD: ${DB_ROADMAP_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_GATEWAY_SECRET: ${INTERNAL_GATEWAY_SECRET}
      GEMINI_API_KEY_ROADMAP: ${GEMINI_API_KEY_ROADMAP:-}
      GEMINI_MODEL_ROADMAP: ${GEMINI_MODEL_ROADMAP:-gemini-2.0-flash}
    ports:
      - "8085:8085"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8085/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - bloom-net

  frontend:
    build:
      context: ./frontend
    image: bloom/frontend:latest
    container_name: bloom-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - bloom-net

  # ─── OBSERVABILITE : metriques ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: bloom-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - bloom-net

  grafana:
    image: grafana/grafana:11.2.0
    container_name: bloom-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - bloom-net
