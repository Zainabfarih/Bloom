name: Bloom CD — build & deploy to OKE

on:
  push:
    branches: [ main ]
    paths:
      - 'services/**'
      - 'infrastructure/**'
      - 'frontend/**'
      - 'k8s/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ${{ secrets.OCIR_REGISTRY }}   # ex: lhr.ocir.io/lrcic9ephrwp
  TAG: ${{ github.sha }}

jobs:

  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: bloom-discovery-server
            path: infrastructure/discovery-server
          - name: bloom-config-server
            path: infrastructure/config-server
          - name: bloom-admin-server
            path: infrastructure/admin-server
          - name: bloom-api-gateway
            path: infrastructure/api-gateway
          - name: bloom-cv-service
            path: services/cv-service
          - name: bloom-job-service
            path: services/job-service
          - name: bloom-auth-service
            path: services/auth-service
          - name: bloom-roadmap-service
            path: services/roadmap-service
          - name: bloom-frontend
            path: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Login to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCIR_REGISTRY_HOST }}   # ex: lhr.ocir.io
          username: ${{ secrets.OCIR_USERNAME }}         # ex: <namespace>/<user>
          password: ${{ secrets.OCIR_TOKEN }}            # OCI Auth Token

      - name: Build & push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.name }}:${{ env.TAG }}
            ${{ env.REGISTRY }}/${{ matrix.name }}:latest

  deploy:
    name: Deploy to OKE
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config

      - name: Deploy manifests
        run: |
          kubectl kustomize --load-restrictor LoadRestrictionsNone k8s/overlays/prod \
            | sed "s#:1.0.0#:${{ github.sha }}#g" \
            | kubectl apply -f -

      - name: Wait for rollout
        run: |
          for d in discovery-server config-server api-gateway admin-server \
                   job-service cv-service auth-service roadmap-service frontend; do
            kubectl -n bloom rollout status deployment/$d --timeout=300s || true
          done
