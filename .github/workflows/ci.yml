name: Bloom CI

on:
  pull_request:
    branches: [ main ]

# ─────────────────────────────────────────────────────────────────
# FONCTIONNEMENT :
#   1. detect-changes → identifie quel service a été modifié
#   2. Pour chaque service modifié, 3 niveaux s'enchaînent :
#      Niveau 1 — Compilation  (mvn compile)
#      Niveau 2 — Tests        (mvn test + services éphémères)
#      Niveau 3 — Build final  (mvn verify + check version SNAPSHOT)
#   Si un niveau échoue → PR refusée automatiquement
#   Si tout passe → PR peut être approuvée et mergée vers main
# ─────────────────────────────────────────────────────────────────

jobs:

  # ════════════════════════════════════════════════════════════════
  # DÉTECTION DES CHANGEMENTS
  # ════════════════════════════════════════════════════════════════
  detect-changes:
    name: "Détection des changements"
    runs-on: ubuntu-latest
    outputs:
      user-service:         ${{ steps.changes.outputs.user-service }}
      cv-service:           ${{ steps.changes.outputs.cv-service }}
      job-service:          ${{ steps.changes.outputs.job-service }}
      roadmap-service:      ${{ steps.changes.outputs.roadmap-service }}
      notification-service: ${{ steps.changes.outputs.notification-service }}
      community-service:    ${{ steps.changes.outputs.community-service }}
      frontend:             ${{ steps.changes.outputs.frontend }}
      config-server:        ${{ steps.changes.outputs.config-server }}
      discovery-server:     ${{ steps.changes.outputs.discovery-server }}
      api-gateway:          ${{ steps.changes.outputs.api-gateway }}
      admin-server:         ${{ steps.changes.outputs.admin-server }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            user-service:
              - 'services/user-service/**'
            cv-service:
              - 'services/cv-service/**'
            job-service:
              - 'services/job-service/**'
            roadmap-service:
              - 'services/roadmap-service/**'
            notification-service:
              - 'services/notification-service/**'
            community-service:
              - 'services/community-service/**'
            frontend:
              - 'frontend/**'
            config-server:
              - 'infrastructure/config-server/**'
            discovery-server:
              - 'infrastructure/discovery-server/**'
            api-gateway:
              - 'infrastructure/api-gateway/**'
            admin-server:
              - 'infrastructure/admin-server/**'


  # ════════════════════════════════════════════════════════════════
  # USER SERVICE
  # ════════════════════════════════════════════════════════════════
  user-service-level1:
    name: "[user-service] Niveau 1 — Compilation"
    needs: detect-changes
    if: needs.detect-changes.outputs.user-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: maven }
      - name: Compile
        run: mvn clean compile -q
        working-directory: services/user-service
        env:
          SPRING_CONFIG_IMPORT: "optional:configserver:"

  user-service-level2:
    name: "[user-service] Niveau 2 — Tests"
    needs: user-service-level1
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_DB: bloom_auth, POSTGRES_USER: bloom, POSTGRES_PASSWORD: bloom }
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: maven }
      - name: Tests unitaires
        run: mvn test
        working-directory: services/user-service
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/bloom_auth
          SPRING_DATASOURCE_USERNAME: bloom
          SPRING_DATASOURCE_PASSWORD: bloom
          SPRING_CONFIG_IMPORT: "optional:configserver:"
          JWT_SECRET: ${{ secrets.JWT_SECRET_CI }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-user-service
          path: services/user-service/target/site/jacoco/

  user-service-level3:
    name: "[user-service] Niveau 3 — Build final"
    needs: user-service-level2
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_DB: bloom_auth, POSTGRES_USER: bloom, POSTGRES_PASSWORD: bloom }
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: maven }
      - name: Vérification version SNAPSHOT
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [[ "$VERSION" != *-SNAPSHOT ]]; then
            echo "La version '$VERSION' doit être un SNAPSHOT sur une PR"
            exit 1
          fi
          echo "Version SNAPSHOT OK : $VERSION"
        working-directory: services/user-service
      - name: Build final
        run: mvn verify -DskipTests
        working-directory: services/user-service
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/bloom_auth
          SPRING_DATASOURCE_USERNAME: bloom
          SPRING_DATASOURCE_PASSWORD: bloom
          SPRING_CONFIG_IMPORT: "optional:configserver:"
          JWT_SECRET: ${{ secrets.JWT_SECRET_CI }}


  # ════════════════════════════════════════════════════════════════
  # CV SERVICE
  # ════════════════════════════════════════════════════════════════
  cv-service-level1:
    name: "[cv-service] Niveau 1 — Compilation"
    needs: detect-changes
    if: needs.detect-changes.outputs.cv-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: maven }
      - name: Compile
        run: mvn clean compile -q
        working-directory: services/cv-service
        env:
          SPRING_CONFIG_IMPORT: "optional:configserver:"

  cv-service-level2:
    name: "[cv-service] Niveau 2 — Tests"
    needs: cv-service-level1
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_DB: bloom_cv, POSTGRES_USER: bloom, POSTGRES_PASSWORD: bloom }
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: maven }
      - name: Tests unitaires
        run: mvn test
        working-directory: services/cv-service
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/bloom_cv
          SPRING_DATASOURCE_USERNAME: bloom
          SPRING_DATASOURCE_PASSWORD: bloom
          SPRING_CONFIG_IMPORT: "optional:configserver:"
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: always()
