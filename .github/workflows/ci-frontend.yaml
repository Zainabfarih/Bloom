name: Bloom CI — frontend

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yaml'

permissions:
  contents: read

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:

  level1-install:
    name: "[frontend] Niveau 1 — Install"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
        working-directory: frontend

  level2-lint:
    name: "[frontend] Niveau 2 — Lint"
    needs: level1-install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  level3-build:
    name: "[frontend] Niveau 3 — Build"
    needs: level2-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
