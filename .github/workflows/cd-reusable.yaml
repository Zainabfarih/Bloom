name: Bloom CD — reusable deploy

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
      context:
        required: true
        type: string
      deployment:
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCIR_REGISTRY_HOST }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_TOKEN }}

      - name: Build & push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.OCIR_REGISTRY }}/${{ inputs.image }}:${{ github.sha }}
            ${{ secrets.OCIR_REGISTRY }}/${{ inputs.image }}:latest

      - uses: azure/setup-kubectl@v4

      - name: Setup OCI CLI
        uses: oracle-actions/configure-oci-cli@v1.3.1
        with:
          user: ${{ secrets.OCI_CLI_USER }}
          tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          api_private_key: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          region: ${{ secrets.OCI_CLI_REGION }}

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config

      - name: Deploy new image
        run: |
          kubectl -n bloom set image deployment/${{ inputs.deployment }} \
            ${{ inputs.deployment }}=${{ secrets.OCIR_REGISTRY }}/${{ inputs.image }}:${{ github.sha }}
          kubectl -n bloom rollout status deployment/${{ inputs.deployment }} --timeout=300s
