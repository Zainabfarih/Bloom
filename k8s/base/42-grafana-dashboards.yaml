# =====================================================================
#  Grafana  -  dashboard "Bloom Microservices Overview"
#  Charge automatiquement via le provider de dashboards.
# =====================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: bloom
  labels:
    app: grafana
data:
  bloom-overview.json: |
    {
      "title": "Bloom - Microservices Overview",
      "uid": "bloom-overview",
      "editable": true,
      "schemaVersion": 39,
      "timezone": "browser",
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "service",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(up{job=\"bloom-microservices\"}, service)",
            "includeAll": true,
            "multi": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "type": "stat",
          "title": "Services UP",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" } } },
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" } } }
              ]
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "up{job=\"bloom-microservices\", service=~\"$service\"}",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP - Requetes / s (par service)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 9, "x": 6, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(http_server_requests_seconds_count{application=~\"$service\"}[5m])) by (application)",
              "legendFormat": "{{application}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP - Latence p95 (s)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 9, "x": 15, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{application=~\"$service\"}[5m])) by (le, application))",
              "legendFormat": "{{application}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "JVM - Memoire Heap utilisee (bytes)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(jvm_memory_used_bytes{area=\"heap\", application=~\"$service\"}) by (application)",
              "legendFormat": "{{application}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "CPU process (%)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "percentunit" } },
          "targets": [
            {
              "refId": "A",
              "expr": "process_cpu_usage{application=~\"$service\"}",
              "legendFormat": "{{application}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP 5xx - Erreurs / s",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(http_server_requests_seconds_count{application=~\"$service\", status=~\"5..\"}[5m])) by (application)",
              "legendFormat": "{{application}}"
            }
          ]
        }
      ]
    }
