# =====================================================================
#  Prometheus  -  metriques via decouverte de pods (kubernetes_sd)
#  Scrape chaque pod annote prometheus.io/scrape=true dans le namespace.
# =====================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: bloom
  labels:
    app: prometheus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
  labels:
    app: prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
  labels:
    app: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: bloom
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: bloom
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: bloom

    scrape_configs:
      # Prometheus se scrape lui-meme
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Microservices Spring Boot : decouverte des pods du namespace bloom
      - job_name: 'bloom-microservices'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [bloom]
        relabel_configs:
          # Ne garder que les pods annotes prometheus.io/scrape=true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # Chemin des metriques depuis l'annotation prometheus.io/path
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Adresse = IP du pod + port de l'annotation prometheus.io/port
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          # label "service" = label "app" du pod (compatibilite dashboards)
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: service
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: bloom
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: bloom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        # emptyDir : donnees perdues au redemarrage du pod.
        # Pour la persistance prod, remplacer par un PersistentVolumeClaim.
        - name: data
          emptyDir: {}
