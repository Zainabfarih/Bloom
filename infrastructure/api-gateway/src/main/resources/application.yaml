spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:

            # ── Job Service ────────────────────────────────────────────
            - id: job-service
              uri: http://job-service:8083
              predicates:
                - Path=/api/job/**


            # ── CV Service ─────────────────────────────────────────────
            - id: cv-service
              uri: http://cv-service:8082
              predicates:
                - Path=/api/cv/**


            # ── Auth Service ─────────────────────────────────────────────
            - id: auth-service
              uri: http://auth-service:8081
              predicates:
                - Path=/api/auth/**, /api/tokens/**, /api/users/**
              filters:
                - StripPrefix=0

            # ── Roadmap Service ─────────────────────────────────────────────
            - id: roadmap-service
              uri: http://roadmap-service:8085
              predicates:
                - Path=/api/roadmap/**
  boot:
    admin:
      client:
        url: ${ADMIN_SERVER_URL:http://localhost:8090}
        username: ${ADMIN_USERNAME:admin}
        password: ${ADMIN_PASSWORD:admin}

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,prometheus,loggers
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

internal:
  security:
    gateway-secret: ${INTERNAL_GATEWAY_SECRET:2RD15mg+lZB1frvOkiaUN9Ycp98o5VMHKHFsfuL4U6U=}


resilience4j:
  circuitbreaker:
    instances:
      job-service-cb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      auth-service-cb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      cv-service-cb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

timelimiter:
  configs:
    default:
      timeout-duration: 20s
  instances:
    job-service-cb:
      timeout-duration: 30s
    cv-service-cb:
      timeout-duration: 60s     # PDF parsing + Gemini + HuggingFace fallback can be slow
    auth-service-cb:
      timeout-duration: 10s