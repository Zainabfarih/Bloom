spring:
  datasource:
    url: ${DB_JOB_URL}
    username: ${DB_JOB_USERNAME}
    password: ${DB_JOB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false
    # CRITIQUE : Flyway doit utiliser une URL directe (port 5432, pas 6543)
    # Port 6543 = PgBouncer Transaction Mode → coupe les connexions entre transactions
    # → Flyway ne peut pas exécuter ses DDL (CREATE TABLE etc.) → aucun log, rien
    # Port 5432 = Session Mode → connexion persistante → Flyway fonctionne
    url: ${DB_JOB_URL_DIRECT}
    username: ${DB_JOB_USERNAME}
    password: ${DB_JOB_PASSWORD}

  data:
    redis:
      url: ${REDIS_URL}
      timeout: 2000ms

skill:
  extractor:
    hf:
      model-url: ${SKILL_EXTRACTOR_HF_MODEL_URL}
    gemini:
      key: ${GEMINI_API_KEY_JOB_SKILLS}
    # Ollama — solution alternative self-hosted (décommenter pour activer)
    # ollama:
    #   url: ${SKILL_EXTRACTOR_OLLAMA_URL}
    #   model: ${SKILL_EXTRACTOR_OLLAMA_MODEL}
    #   timeout-seconds: 120   # Minimum 120s recommandé sur CPU local

jobsapi:
  base-url: ${JOBSAPI_BASE_URL}
  key: ${JOBAPI_KEY}

jwt:
  secret: ${JWT_SECRET}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

feign:
  client:
    config:
      default:
        loggerLevel: NONE

logging:
  level:
    org.flywaydb: DEBUG