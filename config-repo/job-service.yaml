spring:
  datasource:
    url: ${DB_JOB_URL}
    username: ${DB_JOB_USERNAME}
    password: ${DB_JOB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      url: ${REDIS_URL}
      timeout: 5000ms

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    baseline-on-migrate: true
    clean-disabled: false

internal:
  security:
    gateway-secret: ${INTERNAL_GATEWAY_SECRET}

skill:
  extractor:
    hf:
      model-url: ${SKILL_EXTRACTOR_HF_MODEL_URL}
    gemini:
      key: ${GEMINI_API_KEY_JOB_SKILLS}

jobsapi:
  base-url: ${JOBSAPI_BASE_URL}
  key: ${JOBAPI_KEY}

jwt:
  secret: ${JWT_SECRET}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

feign:
  client:
    config:
      default:
        loggerLevel: NONE

logging:
  level:
    org.flywaydb: DEBUG
