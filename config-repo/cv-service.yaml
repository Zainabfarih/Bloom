spring:
  datasource:
    url: ${DB_CV_URL}
    username: ${DB_CV_USERNAME}
    password: ${DB_CV_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    baseline-on-migrate: true
    clean-disabled: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

internal:
  security:
    gateway-secret: ${INTERNAL_GATEWAY_SECRET}

# ─── AI : extraction de skills + analyse ATS du CV ───────────────────────────
cv:
  ai:
    gemini:
      key: ${GEMINI_API_KEY_CV}
    hf:
      skill-extractor-url: ${SKILL_EXTRACTOR_HF_MODEL_URL}

jwt:
  secret: ${JWT_SECRET}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

feign:
  client:
    config:
      default:
        loggerLevel: NONE

logging:
  level:
    org.flywaydb: DEBUG
