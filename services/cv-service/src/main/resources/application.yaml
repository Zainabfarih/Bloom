server:
  port: 8082

spring:
  application:
    name: cv-service

  # ─── DATABASE CV SERVICE ───────────────────────────
  datasource:
    url: jdbc:postgresql://bloom-db-server.postgres.database.azure.com:5432/bloom_cv?sslmode=require
    username: dbadmin
    password: AZrf2026@
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
