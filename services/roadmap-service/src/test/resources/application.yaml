spring:
  application:
    name: roadmap-service
  main:
    allow-bean-definition-overriding: true

  # ─── Pas de config-server ni d'Eureka en test ────────────────────────────
  cloud:
    config:
      enabled: false
      fail-fast: false
      import-check:
        enabled: false
    service-registry:
      auto-registration:
        enabled: false
    discovery:
      enabled: false
    openfeign:
      circuitbreaker:
        enabled: false
  config:
    import: ""

  # ─── Datasource H2 (override le Postgres du main yaml) ───────────────────
  datasource:
    url: jdbc:h2:mem:roadmaptest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # ─── Flyway désactivé : les migrations utilisent du SQL Postgres-only ────
  flyway:
    enabled: false

  # ─── Spring Boot Admin client désactivé ──────────────────────────────────
  boot:
    admin:
      client:
        enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

# ─── Secrets et propriétés métier en valeurs de test ───────────────────────
internal:
  security:
    gateway-secret: test-gateway-secret

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

ai:
  gemini:
    api-key: test-gemini-key
    model: gemini-2.5-flash
    max-output-tokens: 4096
    timeout-seconds: 5
