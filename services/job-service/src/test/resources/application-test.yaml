eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
  instance:
    lease-renewal-interval-in-seconds: 1
    lease-expiration-duration-in-seconds: 2

spring:
  main:
    allow-bean-definition-overriding: true
  cloud:
    config:
      enabled: false
    service-registry:
      auto-registration:
        enabled: false
