spring:
  cloud:
    config:
      enabled: false
  config:
    import: ""

  datasource:
    url: jdbc:h2:mem:bloom_job_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

  data:
    redis:
      url: redis://localhost:6379
      timeout: 2s


jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci10ZXN0aW5nLW9ubHktMTI4Yml0cw==

jobsapi:
  base-url: http://localhost
  key: test-key

skill:
  extractor:
    hf:
      model-url: http://localhost/hf-mock
    gemini:
      key: test-gemini-key

logging:
  level:
    com.bloom: WARN
    org.springframework.security: WARN
    org.hibernate: WARN

internal:
  security:
    gateway-secret: test-gateway-secret